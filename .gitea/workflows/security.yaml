name: Security

on:
  push:
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    container:
      image: colinyates/dev-docker:stable@sha256:89b08c7596f45724fa064a233765f970c0498ce4ea982fc5fd8f504228349753
    env:
      GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      MISE_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install mise tools
        run: |
          mise install

      - name: Run gitleaks
        run: |
          gitleaks detect --source="${GITHUB_WORKSPACE}" --no-git
