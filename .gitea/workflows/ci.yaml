name: CI

on:
  push:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: colinyates/dev-docker:sha-1d74f463f2cfde6b3b1cab8fad8f17f93c935fb0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install mise tools
        run: |
          eval "$(mise activate bash)"
          mise install --verbose
        env:
          MISE_VERBOSE: 1

      - name: Run mise lint
        run: |
          eval "$(mise activate bash)"
          mise run lint
        env:
          MISE_VERBOSE: 1
