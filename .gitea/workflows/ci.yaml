name: CI

on:
  push:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: colinyates/dev-docker:sha-90990da4b5e4c06e056189830d21c95c06fe5723@sha256:43ce528cda1c90af00aace95ce55a7785413f473a417aa0420242491da3c437f
    env:
      MISE_VERBOSE: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install mise tools
        run: mise install --verbose

      - name: Mise ls
        run: |
          mise ls

      - name: Run mise lint
        run: |
          mise run lint
