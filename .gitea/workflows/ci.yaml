name: CI

on:
  push:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: colinyates/dev-docker:stable@sha256:72bd3bd974b023a917c1e3963ac5ac9296b0787ef9d2e1f8f6c1f5983f017aed
    env:
      GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      MISE_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      MISE_VERBOSE: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install mise tools
        run: mise install --verbose

      - name: Mise ls
        run: |
          mise ls

      - name: Run mise lint
        run: |
          mise run lint
