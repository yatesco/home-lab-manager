name: CI

on:
  push:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: colinyates/dev-docker:stable
    env:
      GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      MISE_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      MISE_VERBOSE: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run mise check
        run: |
          mise run check

  lint:
    runs-on: ubuntu-latest
    container:
      image: colinyates/dev-docker:stable@sha256:8e3fb1c837ceaeafb6bd1b817396e3bfdcd0ecbd58b37a79b7d2a80fb0718869
    env:
      GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      MISE_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      MISE_VERBOSE: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run mise lint
        run: |
          mise run lint

  test:
    runs-on: ubuntu-latest
    container:
      image: colinyates/dev-docker:stable
    env:
      GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      MISE_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      MISE_VERBOSE: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run mise test
        run: |
          mise run test

  build:
    runs-on: ubuntu-latest
    container:
      image: colinyates/dev-docker:stable
    env:
      GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      MISE_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      MISE_VERBOSE: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run mise build (release)
        run: |
          mise run build:release
