min_version = "2024.9.5"

[tools]
gitleaks = "latest"

[tasks.bootstrap]
description = "Install tool versions required for all project tasks"
quiet = true
run = ["{{ mise_bin }} install --quiet", "{{ mise_bin }} -C rust run bootstrap"]

[tasks.pre-commit]
description = "Run checks used by the Git pre-commit hook"
run = [
  "{{ mise_bin }} pre-commit:leaks",
  "{{ mise_bin }} check",
  "{{ mise_bin }} -C rust run pre-commit"
]
depends = ["bootstrap"]
wait_for = ["bootstrap"]

[tasks."pre-commit:leaks"]
description = "Check staged git changes for secret leaks"
run = ["gitleaks git --pre-commit --staged --redact"]
depends = ["bootstrap"]
wait_for = ["bootstrap"]

[tasks."secrets:scan"]
description = "Scan the workspace for leaked secrets"
run = ["gitleaks detect --source=. --no-git --report-format json --report-path - --redact | jq -r '.[] | \"\\(.File):\\(.StartLine)\"'"]
depends = ["bootstrap"]
wait_for = ["bootstrap"]

[tasks.lint]
description = "Run lint checks"
run = ["{{ mise_bin }} -C rust run lint"]
depends = ["bootstrap"]
wait_for = ["bootstrap"]

[tasks.check]
description = "Run check"
run = ["{{ mise_bin }} -C rust run check"]
depends = ["bootstrap"]
wait_for = ["bootstrap"]

[tasks.test]
description = "Run tests"
run = ["{{ mise_bin }} -C rust run test"]
depends = ["bootstrap"]
wait_for = ["bootstrap"]

[tasks.build]
description = "Run builds"
run = ["{{ mise_bin }} -C rust run build"]
depends = ["bootstrap"]
wait_for = ["bootstrap"]
